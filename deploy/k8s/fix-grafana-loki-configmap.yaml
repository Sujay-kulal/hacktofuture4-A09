apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-loki-stack
  namespace: monitoring
data:
  loki-stack-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: "http://loki:3100"
        version: 1
        isDefault: false
        jsonData: {}
