apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storefront
  template:
    metadata:
      labels:
        app: storefront
    spec:
      containers:
        - name: storefront
          image: hashicorp/http-echo:1.0
          args: ["-listen=:5678", "-text=storefront ok"]
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: demo
spec:
  selector:
    app: storefront
  ports:
    - port: 80
      targetPort: 5678
